"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>BSI Platform — Overview<\u002Ftitle>\n<style>/* ============================================================\n   BEST Farming Systems — Core design tokens\n   Colors sampled from the registered brand marks:\n     teal  #08A098  (leaf)\n     gold  #FDDB03  (alt wordmark)\n   ============================================================ */\n\n/* ---- Fonts -------------------------------------------------- */\n/* Brand-supplied typefaces:\n     Display / headline : DIN Alternate Bold  (condensed, strong, wide-tracked\n                          — reads as a cousin to the logo wordmark's geometry)\n     Body / UI         : Carrois Gothic Regular  (humanist sans, calm,\n                          legible at data density)\n   Monospace kept as a system/web stack for spec tables, lot numbers, CAS IDs. */\n\n@font-face {\n  font-family: \"DIN Alternate\";\n  src: url(\"8c34dc0e-a2f9-497b-bf38-3aceddb5179c\") format(\"truetype\");\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Carrois Gothic\";\n  src: url(\"14dfa6b8-3caa-4761-afa2-776b369466fd\") format(\"truetype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n/* Italic / bold weights aren't in the supplied Carrois file — we synthesize\n   italic via CSS where it's called for, and use DIN Alternate Bold as our\n   emphasis face. Mono remains a web-safe stack. */\n\n/* ---- Color primitives -------------------------------------- */\n:root {\n  /* Brand */\n  --brand-teal-900: #033b38;\n  --brand-teal-800: #054d48;\n  --brand-teal-700: #066b65;\n  --brand-teal-600: #08a098;  /* logo leaf */\n  --brand-teal-500: #2bb6ae;\n  --brand-teal-400: #62cdc7;\n  --brand-teal-300: #9be0dc;\n  --brand-teal-200: #c9eeec;\n  --brand-teal-100: #e6f7f5;\n  --brand-teal-50:  #f3fbfa;\n\n  --brand-gold-700: #a07e00;\n  --brand-gold-600: #d3a800;\n  --brand-gold-500: #fddb03;  /* alt wordmark */\n  --brand-gold-300: #fde86a;\n  --brand-gold-100: #fef6c5;\n\n  /* Earth / agronomic neutrals — warm-leaning, clinical */\n  --earth-ink:     #141a19;   /* near-black with teal tint */\n  --earth-900:     #1d2524;\n  --earth-800:     #2c3735;\n  --earth-700:     #455250;\n  --earth-600:     #5c6b68;\n  --earth-500:     #7c8b88;\n  --earth-400:     #a5b2af;\n  --earth-300:     #c8d1cf;\n  --earth-200:     #e2e8e6;\n  --earth-150:     #ecf0ee;\n  --earth-100:     #f4f7f5;\n  --earth-50:      #faf9f5;   /* warm paper */\n  --paper:         #fbfaf6;   /* page background */\n  --white:         #ffffff;\n\n  /* Soil / accent (for crop category tags, heatmap highs) */\n  --soil-800: #4a2e18;\n  --soil-600: #8a5a33;\n  --soil-400: #c4a079;\n  --soil-200: #ece0cf;\n\n  /* Semantic data colors (trial charts, efficacy bars) */\n  --data-1: #08a098;   /* BEST / treatment */\n  --data-2: #5c6b68;   /* control / baseline */\n  --data-3: #d3a800;   /* comparator */\n  --data-4: #8a5a33;   /* soil / region */\n  --data-5: #066b65;   /* deep treatment */\n  --data-6: #a5b2af;   /* n/a or untreated */\n\n  /* Status */\n  --ok:     #2f8a4d;\n  --ok-bg:  #e7f3eb;\n  --warn:   #b07a0a;\n  --warn-bg:#faf0d6;\n  --err:    #a4341a;\n  --err-bg: #f7e5df;\n  --info:   var(--brand-teal-700);\n  --info-bg:var(--brand-teal-100);\n\n  /* ---- Semantic surfaces & text ---- */\n  --bg:        var(--paper);\n  --bg-raised: var(--white);\n  --bg-sunken: var(--earth-100);\n  --bg-inset:  var(--earth-150);\n\n  --fg1: var(--earth-ink);      /* primary body + headings */\n  --fg2: var(--earth-700);      /* secondary */\n  --fg3: var(--earth-600);      /* tertiary / meta */\n  --fg4: var(--earth-500);      /* quaternary / labels */\n  --fg-on-brand: var(--white);\n  --fg-link: var(--brand-teal-700);\n  --fg-link-hover: var(--brand-teal-800);\n\n  --border-subtle: var(--earth-200);\n  --border:        var(--earth-300);\n  --border-strong: var(--earth-400);\n  --rule:          var(--earth-200);  /* editorial hairlines */\n\n  --focus-ring: 0 0 0 2px var(--paper), 0 0 0 4px var(--brand-teal-600);\n\n  /* ---- Type system ---- */\n  --font-serif:  \"DIN Alternate\", \"DIN Alternate Bold\", \"DIN Condensed\", \"Oswald\", \"Iowan Old Style\", Georgia, serif;\n  --font-sans:   \"Carrois Gothic\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Helvetica, Arial, sans-serif;\n  --font-mono:   ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n\n  /* Type scale — editorial, desktop-first */\n  --fs-display:  64px;\n  --fs-h1:       44px;\n  --fs-h2:       32px;\n  --fs-h3:       24px;\n  --fs-h4:       18px;\n  --fs-eyebrow:  12px;\n  --fs-body-lg:  18px;\n  --fs-body:     16px;\n  --fs-body-sm:  14px;\n  --fs-caption:  12px;\n  --fs-mono:     13px;\n\n  --lh-tight: 1.1;\n  --lh-snug:  1.25;\n  --lh-body:  1.55;\n  --lh-long:  1.7;\n\n  --tracking-tight:   -0.01em;\n  --tracking-normal:  0;\n  --tracking-wide:    0.08em;\n  --tracking-wider:   0.14em;   /* used in the logo lockup */\n\n  /* ---- Spacing ---- */\n  --s-1:  4px;\n  --s-2:  8px;\n  --s-3:  12px;\n  --s-4:  16px;\n  --s-5:  20px;\n  --s-6:  24px;\n  --s-7:  32px;\n  --s-8:  40px;\n  --s-9:  56px;\n  --s-10: 72px;\n  --s-11: 96px;\n  --s-12: 128px;\n\n  /* ---- Radius — restrained, near-square ---- */\n  --r-0: 0px;\n  --r-1: 2px;\n  --r-2: 4px;\n  --r-3: 8px;\n  --r-4: 12px;\n  --r-pill: 999px;\n\n  /* ---- Elevation — crisp, soft, not SaaS-glowy ---- */\n  --shadow-1: 0 1px 0 rgba(20, 26, 25, 0.04), 0 1px 2px rgba(20, 26, 25, 0.06);\n  --shadow-2: 0 1px 0 rgba(20, 26, 25, 0.04), 0 4px 10px rgba(20, 26, 25, 0.06);\n  --shadow-3: 0 2px 4px rgba(20, 26, 25, 0.06), 0 10px 24px rgba(20, 26, 25, 0.08);\n  --shadow-inset: inset 0 0 0 1px var(--border-subtle);\n\n  /* ---- Motion ---- */\n  --ease-standard: cubic-bezier(0.2, 0.0, 0.0, 1.0);\n  --ease-out:      cubic-bezier(0.16, 1, 0.3, 1);\n  --dur-fast:    120ms;\n  --dur-base:    200ms;\n  --dur-slow:    320ms;\n\n  /* Layout */\n  --maxw-prose: 68ch;\n  --maxw-content: 1200px;\n  --maxw-wide: 1440px;\n}\n\n/* ============================================================\n   Semantic elements — so HTML reads \"write a paragraph\" not\n   \"write a div with these tokens\"\n   ============================================================ */\n\nhtml, body {\n  background: var(--bg);\n  color: var(--fg1);\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n\n.display, h1.display {\n  font-family: var(--font-serif);\n  font-weight: 700;\n  font-size: var(--fs-display);\n  line-height: var(--lh-tight);\n  letter-spacing: 0.01em;\n  text-transform: uppercase;\n  color: var(--fg1);\n}\n\nh1 {\n  font-family: var(--font-serif);\n  font-weight: 700;\n  font-size: var(--fs-h1);\n  line-height: var(--lh-tight);\n  letter-spacing: 0.01em;\n  text-transform: uppercase;\n  color: var(--fg1);\n  margin: 0;\n}\nh2 {\n  font-family: var(--font-serif);\n  font-weight: 700;\n  font-size: var(--fs-h2);\n  line-height: var(--lh-snug);\n  letter-spacing: 0.01em;\n  text-transform: uppercase;\n  color: var(--fg1);\n  margin: 0;\n}\nh3 {\n  font-family: var(--font-sans);\n  font-weight: 600;\n  font-size: var(--fs-h3);\n  line-height: var(--lh-snug);\n  color: var(--fg1);\n  margin: 0;\n}\nh4 {\n  font-family: var(--font-sans);\n  font-weight: 600;\n  font-size: var(--fs-h4);\n  line-height: var(--lh-snug);\n  color: var(--fg1);\n  margin: 0;\n}\n\np {\n  color: var(--fg2);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  margin: 0;\n}\np.lede, .lede {\n  font-family: var(--font-sans);\n  font-style: italic;\n  font-weight: 400;\n  font-size: 20px;\n  line-height: 1.55;\n  color: var(--fg2);\n}\n\n.eyebrow {\n  font-family: var(--font-sans);\n  font-weight: 600;\n  font-size: var(--fs-eyebrow);\n  letter-spacing: var(--tracking-wider);\n  text-transform: uppercase;\n  color: var(--brand-teal-700);\n}\n\n.meta, small {\n  font-size: var(--fs-caption);\n  color: var(--fg3);\n  line-height: 1.4;\n}\n\ncode, .mono {\n  font-family: var(--font-mono);\n  font-size: var(--fs-mono);\n  color: var(--fg1);\n}\n\nhr.rule {\n  border: 0;\n  border-top: 1px solid var(--rule);\n  margin: var(--s-6) 0;\n}\nhr.rule-strong {\n  border: 0;\n  border-top: 2px solid var(--fg1);\n  margin: var(--s-6) 0;\n}\n\na {\n  color: var(--fg-link);\n  text-decoration: underline;\n  text-decoration-thickness: 1px;\n  text-underline-offset: 3px;\n  transition: color var(--dur-fast) var(--ease-standard);\n}\na:hover { color: var(--fg-link-hover); text-decoration-thickness: 2px; }\n\n/* Tabular figures for data-heavy pages */\n.tabular, table, .num {\n  font-variant-numeric: tabular-nums;\n}\n\n/* Utility: the wide-tracked caps lockup seen in the logo */\n.lockup-caps {\n  font-family: var(--font-sans);\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-wider);\n  font-size: var(--fs-eyebrow);\n  color: var(--fg1);\n}\n<\u002Fstyle>\n<script src=\"6f4cfac9-5f59-416d-b8ec-db060ed6b776\"><\u002Fscript>\n<style>\n  deck-stage:not(:defined) { visibility: hidden; }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; background: #0e1413; }\n\n  :root {\n    --gut: 104px;\n    --ink: var(--earth-ink);\n  }\n\n  /* ---- slide base ---- */\n  .s {\n    width: 1920px; height: 1080px; position: relative; overflow: hidden;\n    background: var(--paper); color: var(--fg1);\n    font-family: var(--font-sans);\n    padding: 92px var(--gut);\n    display: flex; flex-direction: column;\n  }\n  .s.dark { background: var(--ink); color: var(--paper); }\n  .s.dark .eyebrow2 { color: var(--brand-teal-400); }\n  .s.dark .meta-foot { color: rgba(255,255,255,0.5); }\n\n  /* ---- type ---- */\n  .display-xl { font-family: var(--font-serif); font-weight: 700; text-transform: uppercase; letter-spacing: 0.01em; line-height: 0.95; }\n  .h1d, .h2d, .display-xl { color: var(--fg1); }\n  .s.dark .h1d, .s.dark .h2d, .s.dark .display-xl { color: var(--paper); }\n  .h1d { font-family: var(--font-serif); font-weight: 700; text-transform: uppercase; letter-spacing: 0.01em; line-height: 1.0; font-size: 76px; margin: 0; }\n  .h2d { font-family: var(--font-serif); font-weight: 700; text-transform: uppercase; letter-spacing: 0.01em; line-height: 1.02; font-size: 52px; margin: 0; }\n  .eyebrow2 { font-family: var(--font-sans); font-weight: 600; text-transform: uppercase; letter-spacing: 0.16em; font-size: 21px; color: var(--brand-teal-700); }\n  .lede2 { font-size: 30px; line-height: 1.45; color: var(--fg2); font-weight: 400; max-width: 1180px; }\n  .body2 { font-size: 24px; line-height: 1.5; color: var(--fg2); }\n  .num { font-family: var(--font-serif); font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 0.01em; line-height: 0.9; }\n  .mono2 { font-family: var(--font-mono); }\n\n  .rule { height: 3px; background: var(--fg1); border: none; }\n  .rule-gold { height: 4px; width: 132px; background: var(--brand-gold-500); border: none; }\n  .s.dark .rule { background: var(--paper); }\n\n  /* header block for content slides */\n  .head { display: flex; flex-direction: column; gap: 14px; margin-bottom: 46px; }\n  .head .eyebrow2 { margin-bottom: 2px; }\n\n  /* cards */\n  .card2 { background: var(--bg-raised); border: 1px solid var(--border-subtle); border-radius: 8px; box-shadow: var(--shadow-1); padding: 34px; }\n  .s.dark .card2 { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.12); box-shadow: none; }\n\n  .chip2 { display: inline-flex; align-items: center; gap: 8px; background: var(--brand-teal-100); color: var(--brand-teal-800); border-radius: 999px; padding: 7px 16px; font-size: 19px; font-weight: 600; }\n  .chip-gold { background: var(--brand-gold-100); color: var(--brand-gold-700); }\n  .chip-soil { background: var(--soil-200); color: var(--soil-800); }\n\n  .ic2 { display: inline-flex; align-items: center; justify-content: center; }\n  .ic2 svg { stroke-width: 1.5px; }\n\n  .meta-foot { position: absolute; left: var(--gut); right: var(--gut); bottom: 54px; display: flex; align-items: center; justify-content: space-between; font-size: 18px; color: var(--fg3); }\n  .logo-foot { height: 34px; }\n\n  .pagenum { font-variant-numeric: tabular-nums; font-family: var(--font-mono); }\n\n  /* node / flow */\n  .node { background: var(--bg-raised); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 20px 22px; box-shadow: var(--shadow-1); }\n  .arrow { color: var(--brand-teal-600); display: inline-flex; align-items: center; }\n\n  /* tier bar */\n  .tier-row { display: grid; grid-template-columns: 240px 110px 1fr 320px; align-items: center; gap: 24px; padding: 20px 0; border-bottom: 1px solid var(--border-subtle); }\n  .bar-track { height: 16px; background: var(--earth-150); border-radius: 999px; overflow: hidden; }\n  .bar-fill { height: 100%; border-radius: 999px; background: var(--brand-teal-600); }\n\n  [data-deck-active] .anim { animation: rise .5s cubic-bezier(0.16,1,0.3,1) both; }\n  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }\n  @media (prefers-reduced-motion: reduce) { .anim { animation: none !important; } }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- 1 · COVER -->\n  <section data-label=\"Cover\" class=\"s dark\">\n    <div style=\"position:absolute; top:0; right:0; width:760px; height:100%; background:linear-gradient(180deg, rgba(8,160,152,0.16), rgba(8,160,152,0));\"><\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:16px;\">\n      <span class=\"ic2\" style=\"color:var(--brand-teal-400)\"><i data-lucide=\"git-fork\"><\u002Fi><\u002Fspan>\n      <span class=\"eyebrow2\">BEST IDN · Pillar B · Platform overview<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"margin-top:auto; margin-bottom:0;\">\n      <hr class=\"rule-gold\" style=\"margin-bottom:40px;\">\n      <h1 class=\"display-xl\" style=\"font-size:188px; margin:0;\">BSI<br>Platform<\u002Fh1>\n      <p class=\"lede2\" style=\"color:rgba(255,255,255,0.78); margin-top:36px; max-width:1100px; font-size:34px;\">The operational distribution-management system that runs the BEST IDN three-level network across Indonesia — attribution, commission, payouts, and compliance in one auditable loop.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"meta-foot\">\n      <span style=\"display:inline-flex; align-items:center; gap:14px;\">\n        <span style=\"background:#fff; border-radius:6px; padding:8px 12px; display:inline-flex;\"><img src=\"2bdf8b34-bd08-43e7-a4e8-e2f559461598\" class=\"logo-foot\" alt=\"Best Environmental Technologies\"><\u002Fspan>\n        <span style=\"color:rgba(255,255,255,0.6)\">Best Environmental Technologies<\u002Fspan>\n      <\u002Fspan>\n      <span style=\"color:rgba(255,255,255,0.5)\">Operated by BSI · v1 overview · 2026<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 2 · CHALLENGE -->\n  <section data-label=\"The challenge\" class=\"s\">\n    <div class=\"head\">\n      <span class=\"eyebrow2\">The challenge<\u002Fspan>\n      <h2 class=\"h1d\" style=\"font-size:64px;\">A 2,414-member network<br>with no digital infrastructure<\u002Fh2>\n      <hr class=\"rule\" style=\"width:132px; margin-top:8px;\">\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:30px; margin-top:8px;\">\n      <div class=\"card2 anim\" style=\"display:flex; gap:22px; align-items:flex-start;\">\n        <span class=\"ic2\" style=\"color:var(--brand-teal-700); width:42px; height:42px;\"><i data-lucide=\"target\" style=\"width:42px;height:42px;\"><\u002Fi><\u002Fspan>\n        <div><div style=\"font-size:27px; font-weight:600; margin-bottom:8px;\">Attribute every sale<\u002Fdiv><div class=\"body2\">No way to tie a retail sale to the Manager of record across the Mall and Leader tiers.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card2 anim\" style=\"display:flex; gap:22px; align-items:flex-start; animation-delay:.06s;\">\n        <span class=\"ic2\" style=\"color:var(--brand-teal-700); width:42px; height:42px;\"><i data-lucide=\"calculator\" style=\"width:42px;height:42px;\"><\u002Fi><\u002Fspan>\n        <div><div style=\"font-size:27px; font-weight:600; margin-bottom:8px;\">Compute &amp; pay at scale<\u002Fdiv><div class=\"body2\">Tiered compensation across 300 managers, 11 malls and 3 leaders, every cycle.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card2 anim\" style=\"display:flex; gap:22px; align-items:flex-start; animation-delay:.12s;\">\n        <span class=\"ic2\" style=\"color:var(--brand-teal-700); width:42px; height:42px;\"><i data-lucide=\"scale\" style=\"width:42px;height:42px;\"><\u002Fi><\u002Fspan>\n        <div><div style=\"font-size:27px; font-weight:600; margin-bottom:8px;\">Prove compliance<\u002Fdiv><div class=\"body2\">Permendag 70/2019 requires sales-driven, not recruitment-driven, income — with evidence.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card2 anim\" style=\"display:flex; gap:22px; align-items:flex-start; animation-delay:.18s;\">\n        <span class=\"ic2\" style=\"color:var(--brand-teal-700); width:42px; height:42px;\"><i data-lucide=\"trending-up\" style=\"width:42px;height:42px;\"><\u002Fi><\u002Fspan>\n        <div><div style=\"font-size:27px; font-weight:600; margin-bottom:8px;\">Track capital flows<\u002Fdiv><div class=\"body2\">The Subscription Pool that triggers BSI's PMA conversion must be evidenced to a notary.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"meta-foot\"><span class=\"pagenum\">02<\u002Fspan><span>BSI Platform · Overview<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 3 · WHAT IT IS / HIERARCHY -->\n  <section data-label=\"The structure\" class=\"s\">\n    <div class=\"head\">\n      <span class=\"eyebrow2\">What it is<\u002Fspan>\n      <h2 class=\"h1d\" style=\"font-size:64px;\">One platform across a<br>four-tier distribution network<\u002Fh2>\n      <hr class=\"rule\" style=\"width:132px; margin-top:8px;\">\n    <\u002Fdiv>\n    <p class=\"lede2\" style=\"margin-top:-18px; margin-bottom:54px;\">Sales attribute at the Manager, roll up through Mall and Leader, and are governed and paid by BSI Admin.<\u002Fp>\n    <div style=\"display:flex; align-items:stretch; gap:22px;\">\n      <div class=\"node anim\" style=\"flex:1; border-top:4px solid var(--brand-teal-600);\">\n        <div class=\"eyebrow2\" style=\"font-size:17px;\">Tier 1<\u002Fdiv>\n        <div style=\"font-size:30px; font-weight:600; margin:6px 0 8px;\">BSI Leader<\u002Fdiv>\n        <div class=\"body2\" style=\"font-size:21px;\">Province-wide oversight, promotions &amp; escalation. Override on every sale.<\u002Fdiv>\n        <div class=\"chip2\" style=\"margin-top:16px;\">3 leaders<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"node anim\" style=\"flex:1; border-top:4px solid var(--brand-teal-500); animation-delay:.06s;\">\n        <div class=\"eyebrow2\" style=\"font-size:17px;\">Tier 2<\u002Fdiv>\n        <div style=\"font-size:30px; font-weight:600; margin:6px 0 8px;\">Mahakam Mall<\u002Fdiv>\n        <div class=\"body2\" style=\"font-size:21px;\">District oversight. Override earnings on managers' sales.<\u002Fdiv>\n        <div class=\"chip2\" style=\"margin-top:16px;\">11 malls<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"node anim\" style=\"flex:1; border-top:4px solid var(--brand-teal-400); animation-delay:.12s;\">\n        <div class=\"eyebrow2\" style=\"font-size:17px;\">Tier 3<\u002Fdiv>\n        <div style=\"font-size:30px; font-weight:600; margin:6px 0 8px;\">Manager<\u002Fdiv>\n        <div class=\"body2\" style=\"font-size:21px;\">Drives retailer sales. Sales auto-tagged; largest per
